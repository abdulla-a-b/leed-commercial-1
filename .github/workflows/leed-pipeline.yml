name: LEED state refresh

# Recomputes data/leed_state.json from the live progress log and commits it,
# so GitHub Pages always serves an up-to-date dashboard.

on:
  schedule:
    - cron: "0 19 * * *"   # 19:00 UTC ≈ 01:00 Dhaka (BST, UTC+6)
  workflow_dispatch: {}      # allow manual run from the Actions tab
  push:
    paths:
      - "data/log.csv"
      - "pipeline/**"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recompute LEED state
        env:
          LEED_API: ${{ secrets.LEED_API }}   # Apps Script /exec URL (optional)
        run: python pipeline/leed_pipeline.py

      - name: Commit refreshed state
        run: |
          git config user.name  "leed-bot"
          git config user.email "leed-bot@users.noreply.github.com"
          git add data/leed_state.json
          if git diff --staged --quiet; then
            echo "No change in LEED state."
          else
            git commit -m "chore: refresh LEED state [skip ci]"
            git push
          fi
